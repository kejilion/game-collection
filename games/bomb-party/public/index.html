<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>💣 炸弹派对 Bomb Party</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💣</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <!-- 顶部 HUD（悬浮） -->
    <header id="hud">
      <div class="hud-group">
        <span class="stat" id="stat-bomb">💣 1</span>
        <span class="stat" id="stat-fire">🔥 1</span>
        <span class="stat" id="stat-speed">⚡ 0</span>
        <span class="stat off" id="stat-shield">🛡️</span>
      </div>
      <div class="hud-group">
        <span class="stat" id="stat-score">⭐ 0</span>
        <span class="stat" id="stat-ping">📶 --</span>
        <button id="btn-board" class="icon-btn" title="排行榜 (Tab)">🏆</button>
        <button id="btn-menu" class="icon-btn" title="菜单 (Esc)">⚙️</button>
      </div>
    </header>

    <!-- 小地图 -->
    <canvas id="minimap"></canvas>

    <!-- 实时排行（右侧简版） -->
    <aside id="players-panel"></aside>

    <!-- 重生提示（非阻挡） -->
    <div id="respawn-banner" class="hidden">
      <div class="skull">💀</div>
      <div id="respawn-text">重生中…</div>
    </div>

    <div id="toast-area"></div>

    <!-- 阻挡式覆盖层 -->
    <div id="overlay" class="hidden">
      <!-- 选角界面 -->
      <div id="join-screen" class="panel hidden">
        <h1 class="title">💣 炸弹派对</h1>
        <p class="subtitle">Q版联机炸弹人 · 常驻大世界 · 同一网址就是同一战场</p>
        <div id="color-picker"></div>
        <div class="join-row">
          <input id="name-input" maxlength="12" placeholder="输入你的昵称" autocomplete="off">
          <button id="join-btn" class="big-btn">进入战场</button>
        </div>
        <div class="tips">
          <span>🎮 方向键 / WASD 移动 · 空格 / J 放炸弹</span>
          <span>⚙️ Esc 菜单 · Tab 排行榜</span>
          <span>📱 手机：左半屏滑动移动 · 右下按钮放炸弹</span>
        </div>
        <div id="join-leaderboard"></div>
      </div>

      <!-- 设置菜单 -->
      <div id="menu-screen" class="panel hidden">
        <h2 class="panel-title">⚙️ 菜单</h2>
        <div class="menu-list">
          <button class="menu-btn" id="menu-resume">▶️ 继续游戏</button>
          <button class="menu-btn" id="menu-sound">🔊 音效：开</button>
          <button class="menu-btn" id="menu-music">🎵 音乐：开</button>
          <button class="menu-btn" id="menu-reselect">🎭 回到选角</button>
          <button class="menu-btn danger" id="menu-quit">🚪 退出游戏</button>
        </div>
      </div>

      <!-- 排行榜 -->
      <div id="board-screen" class="panel hidden">
        <h2 class="panel-title">🏆 排行榜</h2>
        <div class="board-cols">
          <div>
            <div class="board-sub">⚡ 本局实时</div>
            <table id="board-live"></table>
          </div>
          <div>
            <div class="board-sub">📜 历史最佳</div>
            <table id="board-history"></table>
          </div>
        </div>
        <button class="big-btn" id="board-close">关闭</button>
      </div>

      <!-- 已退出 -->
      <div id="quit-screen" class="panel hidden">
        <h2 class="panel-title">👋 已退出游戏</h2>
        <p class="subtitle">感谢游玩，随时回来炸一局！</p>
        <button class="big-btn" id="quit-rejoin">重新进入</button>
      </div>

      <!-- 断线重连 -->
      <div id="reconnect-screen" class="panel hidden">
        <div class="spinner"></div>
        <div>连接断开，正在重连…</div>
      </div>
    </div>

    <!-- 触屏控制 -->
    <div id="touch-controls" class="hidden">
      <div id="touch-move-zone"></div>
      <div id="joystick" class="hidden"><div id="joystick-knob"></div></div>
      <button id="bomb-btn">💣</button>
    </div>
  </div>

  <script src="js/net.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
