# docker compose up -d         鈫?build & run locally
# IMAGE=youruser/arena-brawl:latest docker compose up -d  鈫?run a pulled image
services:
  arena-brawl:
    image: ${IMAGE:-arena-brawl:latest}
    build: .
    container_name: arena-brawl
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - /opt/arena-brawl/data:/app/data        # keep historical leaderboard across restarts
    restart: unless-stopped
